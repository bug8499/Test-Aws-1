# Routes incoming traffic on :80 to the right upstream container
# based on the requested hostname.
#
# main.<EC2_IP>.nip.io  →  web-main:80   (built from branch `main`)
# dev.<EC2_IP>.nip.io   →  web-dev:80    (built from branch `development`)

server {
    listen 80;
    server_name main.18.215.251.196.nip.io;

    location / {
        proxy_pass http://web-main:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name dev.18.215.251.196.nip.io;

    location / {
        proxy_pass http://web-dev:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Drop unknown hosts
server {
    listen 80 default_server;
    return 444;
}
