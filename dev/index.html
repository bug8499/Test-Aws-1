<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0ede6;
      --surface: #e4e0d6;
      --ink:     #1a1814;
      --accent:  #ff3c00;
      --accent2: #0057ff;
      --muted:   #9a9690;
      --grid:    rgba(26,24,20,.07);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* blueprint grid bg */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .scene {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* diagonal accent stripe */
    .stripe {
      position: absolute;
      top: 0; right: 0;
      width: 340px; height: 100vh;
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 18px,
        rgba(255,60,0,.06) 18px,
        rgba(255,60,0,.06) 36px
      );
      pointer-events: none;
    }

    /* top bar */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(90deg,
        var(--accent) 0, var(--accent) 50%,
        var(--accent2) 50%, var(--accent2) 100%);
      background-size: 40px 4px;
    }

    /* corner label */
    .tag {
      position: absolute;
      top: 28px; left: 36px;
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      border-left: 2px solid var(--accent);
      padding-left: 10px;
    }

    /* status chip */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      background: var(--ink);
      color: #f0ede6;
      font-size: .58rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) .15s forwards;
    }
    .chip .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00e87a;
      box-shadow: 0 0 8px #00e87a;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: .2; }
    }

    /* big heading */
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 16vw, 11rem);
      line-height: .9;
      letter-spacing: .02em;
      text-align: center;
      opacity: 0;
      animation: slideIn .6s cubic-bezier(.16,1,.3,1) .3s forwards;
    }
    h1 .ok   { color: var(--ink); display: block; }
    h1 .dev  {
      color: var(--accent);
      display: block;
      -webkit-text-stroke: 2px var(--accent);
    }

    /* bracket decoration */
    .brackets {
      display: flex;
      align-items: center;
      gap: 24px;
      margin: 28px 0;
      opacity: 0;
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) .6s forwards;
    }
    .brackets span {
      font-size: 1.6rem;
      color: var(--accent2);
      font-family: 'Space Mono', monospace;
      font-weight: 700;
    }
    .brackets .mid {
      font-size: .6rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* sub line */
    .sub {
      font-size: .62rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) .8s forwards;
    }

    /* bottom right domain */
    .domain {
      position: absolute;
      bottom: 28px; right: 36px;
      font-size: .58rem;
      letter-spacing: .18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* bottom left build info */
    .build {
      position: absolute;
      bottom: 28px; left: 36px;
      font-size: .55rem;
      letter-spacing: .12em;
      color: var(--muted);
    }
    .build strong { color: var(--accent2); }

    @keyframes pop {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="topbar"></div>
    <div class="stripe"></div>

    <div class="tag">environment / dev</div>

    <div class="chip"><span class="dot"></span>development server active</div>

    <h1>
      <span class="ok">Ok</span>
      <span class="dev">Dev</span>
    </h1>

    <div class="brackets">
      <span>[</span>
      <span class="mid">development · unstable · wip</span>
      <span>]</span>
    </div>

    <p class="sub">Feature branch · Staging · Not for production</p>

    <div class="domain">dev.domain</div>
    <div class="build">build / <strong>#dev-latest</strong></div>
  </div>
</body>
</html>
