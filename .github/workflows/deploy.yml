name: Deploy main + proxy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push web-main image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-domain-web:main .
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-domain-web:main

      - name: Build and push proxy image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-domain-proxy:latest ./proxy
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-domain-proxy:latest

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"

            # Shared network so the proxy can reach web-main / web-dev by name.
            docker network create webnet 2>/dev/null || true

            # ── web-main ──────────────────────────────
            # No published port — only reachable via the webnet network.
            docker pull "$DOCKER_USERNAME/multi-domain-web:main"
            docker stop web-main 2>/dev/null || true
            docker rm   web-main 2>/dev/null || true
            docker run -d \
              --name web-main \
              --network webnet \
              --restart unless-stopped \
              "$DOCKER_USERNAME/multi-domain-web:main"

            # ── proxy ─────────────────────────────────
            # Public entrypoint on :80 — routes by Host header.
            docker pull "$DOCKER_USERNAME/multi-domain-proxy:latest"
            docker stop proxy 2>/dev/null || true
            docker rm   proxy 2>/dev/null || true
            docker run -d \
              --name proxy \
              --network webnet \
              -p 80:80 \
              --restart unless-stopped \
              "$DOCKER_USERNAME/multi-domain-proxy:latest"

            # web-dev is deployed by the development branch workflow.
            docker ps --format '{{.Names}}' | grep -q '^web-dev$' \
              || echo "[info] web-dev not running — push the development branch to deploy it."