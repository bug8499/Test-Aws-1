<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>__ENV_LABEL__</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --accent:   #c8f542;
      --accent2:  #42f5c8;
      --text:     #e8e8f0;
      --muted:    #5a5a7a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* noise grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: .5;
    }

    .scene {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* background glow blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .18;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 560px; height: 560px;
      background: var(--accent);
      top: -160px; left: -160px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -100px; right: -80px;
      animation-delay: -4s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* corner tag */
    .tag {
      position: absolute;
      top: 32px; left: 40px;
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .tag span { color: var(--accent); }

    /* env badge */
    .env-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      border: 1px solid rgba(200,245,66,.25);
      border-radius: 999px;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp .6s .2s forwards;
    }
    .env-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .3; }
    }

    /* headline */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(4.5rem, 14vw, 10rem);
      line-height: .95;
      letter-spacing: -.02em;
      text-align: center;
      opacity: 0;
      animation: fadeUp .7s .4s forwards;
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
      display: block;
    }

    /* divider line */
    .line {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 40px auto;
      opacity: 0;
      animation: fadeUp .6s .7s forwards;
    }

    /* sub text */
    .sub {
      font-size: .72rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp .6s .9s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* corner domain indicator */
    .domain {
      position: absolute;
      bottom: 32px; right: 40px;
      font-size: .6rem;
      letter-spacing: .16em;
      color: var(--muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="tag">env / <span>__ENV_LONG__</span></div>

    <div class="env-badge">__ENV_LABEL__ environment</div>

    <h1>Ok<em>__ENV_LABEL__</em></h1>

    <div class="line"></div>

    <p class="sub">Production · Ready · Online</p>

    <div class="domain">__ENV_DOMAIN__.domain</div>
  </div>
</body>
</html>
